# SonarQube Configuration
# Update sonar.host.url and sonar.token via environment variables in CI

sonar.projectKey=[PROJECT_KEY]
sonar.projectName=[PROJECT_NAME]
sonar.sources=frontend/src
sonar.tests=frontend/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/types/**,**/constants/**

# Quality Gate Thresholds
sonar.qualitygate.wait=true
